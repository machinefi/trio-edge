[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trio-core"
version = "0.2.1"
description = "Portable video inference engine for VLMs — Apple Silicon, NVIDIA, and CPU"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{name = "Trio Team"}]
keywords = ["vlm", "video", "inference", "vision-language-model", "apple-silicon"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "opencv-python-headless",
    "numpy",
    "fastapi>=0.104",
    "uvicorn[standard]",
    "typer>=0.9",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
]

[project.urls]
Homepage = "https://github.com/machinefi/trio-core"
Repository = "https://github.com/machinefi/trio-core"
Issues = "https://github.com/machinefi/trio-core/issues"

[project.optional-dependencies]
mlx = ["mlx-vlm>=0.3.12"]
transformers = ["transformers>=4.40", "torch", "accelerate", "qwen-vl-utils"]
all = ["trio-core[mlx,transformers]"]
dev = ["pytest", "pytest-asyncio", "httpx"]

[project.scripts]
trio-core = "trio_core.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/trio_core"]
