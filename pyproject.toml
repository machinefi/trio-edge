[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trio-core"
version = "0.5.0"
description = "Local VLM inference engine for video — Apple Silicon, NVIDIA, and CPU"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10,<3.14"
# Note: mlx requires Python <3.14; use Python 3.12 or 3.13
authors = [{name = "Trio Team"}]
keywords = ["vlm", "video", "inference", "vision-language-model", "apple-silicon", "trioclaw", "openclaw"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy",
    "Pillow>=9.0",
    "opencv-python-headless",
    "fastapi>=0.104",
    "python-multipart>=0.0.6",
    "uvicorn[standard]",
    "typer>=0.9",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
]

[project.urls]
Homepage = "https://github.com/machinefi/trio-core"
Repository = "https://github.com/machinefi/trio-core"
Issues = "https://github.com/machinefi/trio-core/issues"

[project.optional-dependencies]
mlx = ["mlx>=0.16", "mlx-vlm>=0.3.12"]
transformers = ["transformers>=4.40", "torch", "accelerate", "qwen-vl-utils"]
gui = ["opencv-python>=4.8"]
all = ["trio-core[mlx,transformers]"]
dev = ["pytest", "pytest-asyncio", "httpx"]

[project.scripts]
trio-core = "trio_core.cli:app"
trio = "trio_core.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/trio_core"]
exclude = ["src/trio_core/eval.py", "src/trio_core/eval_benchmarks.py"]
