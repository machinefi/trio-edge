name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  run-test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev,claw,cuda]' pytest-timeout pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --timeout=30 --cov=trio_core --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-linux-${{ matrix.python-version }}
          path: coverage.xml

  run-test-macos:
    runs-on: macos-14
    timeout-minutes: 5
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e '.[dev,claw,mlx,mlx-vlm]' pytest-timeout pytest-cov

      - name: Run tests
        run: python -m pytest tests/ -v --timeout=30 --cov=trio_core --cov-report=term-missing

  test-linux:
    if: always()
    needs: run-test-linux
    runs-on: ubuntu-latest
    steps:
      - if: ${{ needs.run-test-linux.result != 'success' }}
        run: exit 1

  test-macos:
    if: always()
    needs: run-test-macos
    runs-on: ubuntu-latest
    steps:
      - if: ${{ needs.run-test-macos.result != 'success' }}
        run: exit 1
