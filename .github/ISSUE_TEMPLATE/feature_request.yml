name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem does this feature solve? What's the use case?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like it to work. Include API design, CLI flags, or configuration if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about and why they don't work as well.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of trio-core does this affect?
      options:
        - Detection / Counting pipeline
        - VLM inference
        - API server
        - CLI (trio command)
        - Analytics / Insights
        - Camera management
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Related papers, benchmarks, prior art, or impact on existing functionality.
